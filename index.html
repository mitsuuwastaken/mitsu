<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitsu | Música Oficial</title>
    <meta name="description" content="Sitio web oficial de Mitsu. Escucha las últimas canciones, explora la estética oscura y sumérgete en el sonido del vacío.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Abstract Background -->
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="container">
        <!-- Hero Section -->
        <header class="hero glass-panel fade-in">
            <h1 class="artist-name">Mitsu</h1>
        </header>

        <!-- Music Section -->
        <section class="music-section glass-panel fade-in delay-1">
            <h2 class="section-title">Discografía</h2>
            <div class="soundcloud-wrapper">
                <iframe 
                    width="100%" 
                    height="600" 
                    scrolling="no" 
                    frameborder="no" 
                    allow="autoplay" 
                    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/mitsuuuu&color=%23AA00FF&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
                </iframe>
            </div>
        </section>

        <!-- About Section -->
        <section class="about-section glass-panel fade-in delay-2">
            <h2 class="section-title">Sobre el Artista</h2>
            <p class="bio-text">
                He usado el FL tres veces en mi vida, tampoco me pidas mucho<br><br>
                snc 2025
            </p>
            <div class="social-links">
                <a href="https://soundcloud.com/mitsuuuu" target="_blank" class="btn">Perfil de SoundCloud</a>
                <a href="https://instagram.com/javier.vmartin" target="_blank" class="btn btn-outline">Instagram</a>
            </div>
        </section>
    </main>

    <footer class="glass-panel-footer fade-in delay-3">
        <p>&copy; 2026 Mitsu. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
